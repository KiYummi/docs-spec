# OpenAPI 规范

> **用途**: API 接口的 OpenAPI 3.0 规范定义
> **维护者**: docs agent

---

```yaml
openapi: 3.0.3
info:
  title: {产品名称} API
  description: {产品名称} RESTful API 接口规范
  version: 1.0.0
  contact:
    name: API Support
    email: {support_email}

servers:
  - url: {base_url}
    description: {环境说明}

paths:
  /api/v1/{resource}:
    get:
      summary: 查询{资源}列表
      tags:
        - {模块名}
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
```
